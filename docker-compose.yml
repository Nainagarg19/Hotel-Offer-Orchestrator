services:
  postgresql:
    image: postgres:15
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5432:5432"

  temporal:
    image: temporalio/auto-setup:1.28.1
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
    ports:
      - "7233:7233"
    depends_on:
      - postgresql

  temporal-ui:
    image: temporalio/ui:2.39.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      - temporal

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    command: npm start
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - temporal

  worker:
    build: .
    command: npm run worker
    restart: unless-stopped
    environment:
      SUPPLIER_BASE_URL: http://app:3000
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - app
      - temporal
